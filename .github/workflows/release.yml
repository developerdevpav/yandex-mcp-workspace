name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Build jar
        run: mvn -B -DskipTests package

      - name: Upload jars
        uses: actions/upload-artifact@v4
        with:
          name: jars
          path: |
            yandex-mcp-workspace-tracker/target/yandex-mcp-workspace-tracker-*.jar
            yandex-mcp-workspace-wiki/target/yandex-mcp-workspace-wiki-*.jar

  docker:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - module: yandex-mcp-workspace-tracker
            suffix: tracker
          - module: yandex-mcp-workspace-wiki
            suffix: wiki
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download jars
        uses: actions/download-artifact@v4
        with:
          name: jars
          path: .

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.suffix }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.runtime
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: MCP_MODULE=${{ matrix.module }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=runtime-${{ matrix.suffix }}
          cache-to: type=gha,mode=max,scope=runtime-${{ matrix.suffix }}

  release:
    needs: [build, docker]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download jars
        uses: actions/download-artifact@v4
        with:
          name: jars
          path: .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            yandex-mcp-workspace-tracker/target/yandex-mcp-workspace-tracker-*.jar
            yandex-mcp-workspace-wiki/target/yandex-mcp-workspace-wiki-*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
